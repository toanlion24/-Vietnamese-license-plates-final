# YOLOv11 Detection Configuration

# Model
model:
  name: yolov11s
  pretrained: true
  nc: 1  # number of classes (plate only)
  conf: 0.25
  iou: 0.45

# Data paths
data:
  train: D:/ComputerVisionLasted/License Plate Detection Dataset/images/train
  val: D:/ComputerVisionLasted/License Plate Detection Dataset/images/val
  test: D:/ComputerVisionLasted/License Plate Detection Dataset/images/test
  nc: 1
  names: ['license_plate']

# Training settings
training:
  epochs: 100
  batch_size: 16
  imgsz: 640
  device: 0  # 0 = GPU0, 'cpu' = CPU
  
  # Optimizer
  optimizer: AdamW
  lr0: 0.001
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  
  # Scheduler
  scheduler: cosine
  warmup_epochs: 3
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1
  
  # Augmentation
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 5.0
  translate: 0.1
  scale: 0.5
  shear: 0.0
  perspective: 0.0
  flipud: 0.0
  fliplr: 0.5
  mosaic: 1.0
  mixup: 0.0
  copy_paste: 0.0

# Validation
val:
  save_json: true
  save_hybrid: true
  conf: 0.001
  iou: 0.6
  max_det: 300

# Export
export:
  format: [onnx, torchscript]
  opset: 12
  simplify: true
  half: false

# Paths
project: runs/detect
name: yolov11s_plates
exist_ok: true
