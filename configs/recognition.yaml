Global:
  algorithm: CRNN
  use_gpu: true
  gpu_mem: 8000
  ir_optim: true
  use_tensorrt: false
  precision: "fp32"
  enable_mkldnn: false
  max_text_length: 25
  character_dict_path: ../configs/vietnamese_dict.txt
  character_type: ch
  batch_size: 32
  num_workers: 4
  drop_score: 0.5
  use_pdserving: false

Architecture:
  model_type: rec
  algorithm: CRNN
  Backbone:
    name: ResNet34_vd
    layers: 34
  Neck:
    name: RNNEncoder
    encoder_type: rnn
    hidden_size: 256
    num_directions: 2
  Head:
    name: CTCHead
    mid_channels: 256
    fc_decay: 0.0001

Loss:
  name: CTCLoss

Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr: 0.001

PostProcess:
  name: CTCLabelDecode

Metric:
  name: RecMetric
  main_indicator: acc

Train:
  dataset:
    name: SimpleDataset
    data_dir: ../data/datasets/ocr_recognition/train
    label_file: ../data/datasets/ocr_recognition/train_labels.txt
  loader:
    shuffle: true
    batch_size: 32
    num_workers: 4
    drop_last: true

Eval:
  dataset:
    name: SimpleDataset
    data_dir: ../data/datasets/ocr_recognition/val
    label_file: ../data/datasets/ocr_recognition/val_labels.txt
  loader:
    shuffle: false
    batch_size: 32
    num_workers: 4
